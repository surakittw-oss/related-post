<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Related Posts Generator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface2: #eef0f4;
    --border: #e0e3ea;
    --accent: #2563eb;
    --accent2: #6d41f5;
    --text: #1a1d2e;
    --text2: #6b7280;
    --success: #16a34a;
    --error: #dc2626;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans Thai', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 40px 20px;
  }

  .wrap { max-width: 780px; margin: 0 auto; }

  header {
    margin-bottom: 40px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 12px;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    padding: 14px 16px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text2); opacity: 0.6; }

  .hint {
    font-size: 12px;
    color: var(--text2);
    margin-top: 8px;
    line-height: 1.6;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  button {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    padding: 10px 20px;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    flex: 1;
  }

  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  /* Progress */
  .progress-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .progress-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text2);
    padding: 8px 12px;
    border-radius: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    transition: all 0.2s;
  }

  .progress-item.loading { color: var(--text); }
  .progress-item.done { color: var(--success); }
  .progress-item.fail { color: var(--error); }

  .progress-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .progress-item.loading .progress-dot {
    background: var(--accent);
    animation: pulse 1s infinite;
  }

  .progress-item.done .progress-dot { background: var(--success); }
  .progress-item.fail .progress-dot { background: var(--error); }

  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  .url-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: var(--mono);
    font-size: 12px;
  }

  .status-text { font-size: 12px; margin-left: auto; flex-shrink: 0; }

  /* Preview */
  .preview-box {
    background: #fff;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .preview-title {
    font-size: 15px;
    font-weight: 700;
    color: #000000;
    border-bottom: 2px solid #e62227;
    padding-bottom: 8px;
    margin-bottom: 4px;
    font-family: var(--sans);
  }

  .preview-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #f0f0f0;
  }

  .preview-item:last-child { border-bottom: none; }

  .preview-thumb {
    width: 100px; height: 68px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
    background: #f0f0f0;
  }

  .preview-thumb-placeholder {
    width: 100px; height: 68px;
    border-radius: 6px;
    background: #f0f0f0;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .preview-text { flex: 1; }

  .preview-post-title {
    font-size: 14px;
    font-weight: 600;
    color: #111;
    line-height: 1.5;
    margin-bottom: 4px;
    font-family: var(--sans);
  }

  .preview-meta {
    font-size: 11px;
    color: #888;
    font-family: var(--sans);
  }

  /* Code output */
  .code-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    color: #1e5c2e;
    white-space: pre;
    overflow-x: auto;
    max-height: 280px;
    overflow-y: auto;
  }

  .copy-row {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
  }

  .btn-copy {
    background: var(--success);
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 6px;
  }

  .btn-copy:hover { filter: brightness(1.1); }

  .copied-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--success);
    opacity: 0;
    transition: opacity 0.3s;
    align-self: center;
  }

  .copied-badge.show { opacity: 1; }

  .hidden { display: none !important; }

  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }

  .tab {
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  .tab.active {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--border);
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </div>
      <h1>Related Posts Generator</h1>
    </div>
    <p class="subtitle">วาง URL → Generate → Copy HTML ไปวางใน WordPress Classic Editor</p>
  </header>

  <!-- Input -->
  <div class="card" id="input-card">
    <div class="card-label">วาง URL ที่ต้องการ</div>
    <textarea id="url-input" placeholder="https://example.com/news-1&#10;https://example.com/news-2&#10;https://example.com/news-3"></textarea>
    <p class="hint">วาง URL ทีละบรรทัด รองรับลิงก์ภายในและภายนอกเว็บ</p>
    <div class="btn-row">
      <button class="btn-primary" id="gen-btn" onclick="startGenerate()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Generate HTML
      </button>
      <button class="btn-ghost" onclick="clearAll()">ล้าง</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="card hidden" id="progress-card">
    <div class="card-label">กำลังดึงข้อมูล</div>
    <ul class="progress-list" id="progress-list"></ul>
  </div>

  <!-- Result -->
  <div class="card hidden" id="result-card">
    <div class="card-label">ผลลัพธ์</div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('preview')">Preview</button>
      <button class="tab" onclick="switchTab('html')">HTML Code</button>
    </div>

    <div id="tab-preview">
      <div class="preview-box" id="preview-content"></div>
    </div>

    <div id="tab-html" class="hidden">
      <div class="code-block" id="html-output"></div>
    </div>

    <div class="copy-row">
      <span class="copied-badge" id="copied-badge">✓ คัดลอกแล้ว</span>
      <button class="btn-copy" onclick="copyHTML()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy HTML
      </button>
      <button class="btn-ghost" onclick="resetForm()">Generate ใหม่</button>
    </div>
  </div>

</div>

<script>
let generatedHTML = '';
let items = [];

function getUrls() {
  return document.getElementById('url-input').value
    .split('\n')
    .map(u => u.trim())
    .filter(u => u && u.startsWith('http'));
}

async function fetchMeta(url) {
  try {
    const res  = await fetch(`/api/fetch-meta?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    return data;
  } catch(e) {
    return { url, title: url, thumbnail: '', date: '', time: '', ok: false };
  }
}

async function startGenerate() {
  const urls = getUrls();
  if (!urls.length) return;

  document.getElementById('gen-btn').disabled = true;
  document.getElementById('progress-card').classList.remove('hidden');
  document.getElementById('result-card').classList.add('hidden');

  const list = document.getElementById('progress-list');
  list.innerHTML = '';

  items = [];

  for (const url of urls) {
    const li = document.createElement('li');
    li.className = 'progress-item loading';
    li.innerHTML = `
      <span class="progress-dot"></span>
      <span class="url-text">${url}</span>
      <span class="status-text">กำลังดึง...</span>
    `;
    list.appendChild(li);

    const data = await fetchMeta(url);
    items.push(data);

    li.className = `progress-item ${data.ok ? 'done' : 'fail'}`;
    li.querySelector('.status-text').textContent = data.ok ? '✓ สำเร็จ' : '✗ ไม่ได้';
  }

  buildResult();
}

function buildResult() {
  // Preview
  const previewEl = document.getElementById('preview-content');
  let previewHTML = `<div class="preview-title">ข่าวที่เกี่ยวข้อง</div>`;
  items.forEach(item => {
    const thumb = item.thumbnail
      ? `<img class="preview-thumb" src="${item.thumbnail}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="">`
      : '';
    const placeholder = `<div class="preview-thumb-placeholder" style="${item.thumbnail ? 'display:none' : ''}"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg></div>`;
    const meta = item.date ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:3px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${item.date} | ${item.time}` : '';
    previewHTML += `
      <div class="preview-item">
        ${thumb}${placeholder}
        <div class="preview-text">
          <div class="preview-post-title">${item.title}</div>
          ${meta ? `<div class="preview-meta">${meta}</div>` : ''}
        </div>
      </div>`;
  });
  previewEl.innerHTML = previewHTML;

  // HTML output
  generatedHTML = buildHTMLBlock();
  document.getElementById('html-output').textContent = generatedHTML;

  document.getElementById('result-card').classList.remove('hidden');
  document.getElementById('gen-btn').disabled = false;
}

function buildHTMLBlock() {
  let rows = '';
  items.forEach(item => {
    const thumbHTML = item.thumbnail
      ? `<img src="${item.thumbnail}" alt="${escapeAttr(item.title)}" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.display='none'">`
      : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg></div>`;
    const metaHTML = item.date
      ? `<span style="font-size:12px;color:#888;display:inline-flex;align-items:center;gap:3px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${item.date} | ${item.time}</span>`
      : '';
    rows += `
  <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0">
    <a href="${item.url}" style="display:flex;gap:12px;text-decoration:none;color:inherit;align-items:flex-start" target="_blank" rel="noopener">
      <div style="flex-shrink:0;width:100px;height:68px;border-radius:6px;overflow:hidden;background:#f0f0f0">${thumbHTML}</div>
      <div style="flex:1">
        <p style="font-size:14px;font-weight:600;line-height:1.5;margin:0 0 4px;color:#111">${item.title}</p>
        ${metaHTML}
      </div>
    </a>
  </div>`;
  });

  return `<div style="margin-top:32px;font-family:sans-serif">
  <h3 style="font-size:16px;font-weight:700;color:#000000;border-bottom:2px solid #e62227;padding-bottom:8px;margin:0 0 4px">ข่าวที่เกี่ยวข้อง</h3>${rows}
</div>`;
}

function escapeAttr(str) {
  return str.replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-preview').classList.toggle('hidden', tab !== 'preview');
  document.getElementById('tab-html').classList.toggle('hidden', tab !== 'html');
}

function copyHTML() {
  navigator.clipboard.writeText(generatedHTML).then(() => {
    const badge = document.getElementById('copied-badge');
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 2000);
  });
}

function clearAll() {
  document.getElementById('url-input').value = '';
}

function resetForm() {
  document.getElementById('progress-card').classList.add('hidden');
  document.getElementById('result-card').classList.add('hidden');
  document.getElementById('url-input').value = '';
  document.getElementById('gen-btn').disabled = false;
  items = [];
}
</script>
</body>
</html>
